<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nurser — Contribuidor</title>
<link rel="stylesheet" href="nurser.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4361ee">
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header>
  <div>
    <h1 id="teamNameHeader">Cargando...</h1>
    <div class="team-info" id="teamDescSnippet" onclick="openDescriptionModal()"></div>
  </div>
  <div class="header-right">
    <div class="user-badge" id="userBadge">...</div>
    <button class="gear-btn" onclick="openTeamsPanel()" aria-label="Menú">⚙️</button>
  </div>
</header>

<!-- ═══ SHIFT BANNER ═══ -->
<div class="shift-banner" id="shiftBanner" onclick="toggleStatusPanel()" style="display:none">
  <span id="shiftLabel"></span><span class="banner-chevron" id="bannerChevron">▼</span>
  <button class="shift-btn start" id="shiftBtn" onclick="event.stopPropagation(); toggleShift()">Iniciar turno</button>
</div>
<div class="status-panel" id="statusPanel">
  <div class="status-panel-inner">
    <h5>Estado del equipo</h5>
    <div id="statusMemberList">Cargando...</div>
  </div>
</div>

<!-- ═══ PINNED NOTE (visible on all panels) ═══ -->
<div class="pinned-note" id="pinnedNote">
  <div class="pinned-head">
    <h4>📌 Nota fijada</h4>
    <button class="pinned-edit-btn" onclick="openPinnedEditor()">✏️ Editar</button>
  </div>
  <p id="pinnedText"></p>
  <div class="pinned-meta" id="pinnedMeta"></div>
</div>

<!-- ═══ TABS ═══ -->
<div class="tabs">
  <button class="tab active" data-tab="events">⚡ Registrar</button>
  <button class="tab" data-tab="timeline">📋 Línea de tiempo</button>
</div>

<!-- ═══ PANEL: Quick Events ═══ -->
<div class="panel active" id="events">
  <div class="event-grid" id="eventGrid">
    <!-- rendered by JS -->
  </div>
</div>

<!-- ═══ PANEL: Timeline ═══ -->
<div class="panel" id="timeline">
  <div id="timelineList">
    <!-- populated by JS -->
  </div>
</div>

<!-- ═══ MODAL ═══ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent">
    <!-- filled dynamically -->
  </div>
</div>

<!-- ═══ TEAMS PANEL (full-screen) ═══ -->
<div class="teams-overlay" id="teamsPanel">
  <div class="tp-header">
    <h2>Mis equipos</h2>
    <button class="tp-close" onclick="closeTeamsPanel()">✕</button>
  </div>

  <div id="teamsCardList" class="tp-teams-list"></div>

  <div class="tp-create-wrap">
    <div class="tp-create-btn" onclick="openCreateTeamModal()">＋ Crear nuevo equipo</div>
  </div>

  <div class="tp-footer">
    <div class="tp-footer-item" onclick="window.location.href='profile.html'">
      <span class="tp-fi-icon">👤</span> Mi perfil
    </div>
    <div class="tp-footer-item" onclick="openContactModal()">
      <span class="tp-fi-icon">💬</span> Contáctanos
    </div>
    <div class="tp-footer-item" onclick="doLogout()">
      <span class="tp-fi-icon">🚪</span> <span style="color:var(--danger)">Cerrar sesión</span>
    </div>
  </div>
</div>

<!-- ═══ CONTACT MODAL ═══ -->
<div id="contactModal" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.45);align-items:center;justify-content:center;padding:20px">
  <div style="background:#fff;border-radius:16px;padding:24px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,0.18)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h2 style="font-size:17px;font-weight:700">💬 Contáctanos</h2>
      <button onclick="closeContactModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#888;line-height:1">&times;</button>
    </div>
    <div style="margin-bottom:12px">
      <label style="display:block;font-size:12px;font-weight:700;color:#8292a5;margin-bottom:4px">Teléfono</label>
      <input id="cntPhone" type="tel" style="width:100%;border:1px solid #e3e8f0;border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit;outline:none" placeholder="+52 55 1234 5678">
    </div>
    <div style="margin-bottom:12px">
      <label style="display:block;font-size:12px;font-weight:700;color:#8292a5;margin-bottom:4px">Correo electrónico</label>
      <input id="cntEmail" type="email" style="width:100%;border:1px solid #e3e8f0;border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit;outline:none" placeholder="tu@correo.com">
    </div>
    <div style="margin-bottom:16px">
      <label style="display:block;font-size:12px;font-weight:700;color:#8292a5;margin-bottom:4px">Comentarios</label>
      <textarea id="cntMessage" rows="4" style="width:100%;border:1px solid #e3e8f0;border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit;outline:none;resize:vertical" placeholder="¿En qué podemos ayudarte?"></textarea>
    </div>
    <button id="cntSendBtn" onclick="sendContact()" style="width:100%;padding:13px;background:linear-gradient(135deg,#4361ee,#3a50d9);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer">Enviar mensaje</button>
  </div>
</div>

<!-- ═══ NOTIFICATION POPUP (demo) ═══ -->
<div class="notif-popup" id="notifPopup" style="display:none">
  <div class="notif-card">
    <span class="notif-icon">🔴</span>
    <div class="notif-body">
      <div class="notif-title">Fin de turno — Lupe</div>
      <div class="notif-text">Lupe terminó su turno en Cuidado de Sandra</div>
      <div class="notif-time" id="notifTime"></div>
    </div>
    <button class="notif-dismiss" onclick="dismissNotif()">✕</button>
  </div>
</div>

<!-- ═══ TOAST ═══ -->
<div class="toast" id="toast"></div>

<script>
const API_BASE = '';

// ── State ──
let currentUser = null;
let activeTeam = null;
let teamsCache = [];
let eventTypesCache = [];
let shiftEventType = null;
let shiftActive = false;
let currentModal = null;
let pinnedNoteText = '';

const fmt = d => d.toTimeString().slice(0, 5);

// ── XSS-safe helper ──
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Authenticated fetch ──
async function apiFetch(path, opts = {}) {
  return fetch(API_BASE + path, { credentials: 'include', ...opts });
}

// ── Init ──
async function init() {
  try {
    const r = await apiFetch('/users/me');
    if (!r.ok) { window.location.replace('login.html'); return; }
    currentUser = await r.json();
  } catch {
    window.location.replace('login.html'); return;
  }

  document.getElementById('userBadge').textContent = (currentUser.name || '?').split(' ')[0];

  const tr = await apiFetch('/teams');
  if (!tr.ok) { showToast('Error cargando equipos'); return; }
  teamsCache = await tr.json();

  if (!teamsCache.length) {
    showNoTeamsState(); return;
  }

  const params = new URLSearchParams(window.location.search);
  const paramId = params.get('team_id');
  const storedId = paramId || localStorage.getItem('activeTeamId');
  activeTeam = teamsCache.find(t => t.id === storedId) || teamsCache[0];
  localStorage.setItem('activeTeamId', activeTeam.id);

  updateHeader();
  await loadEventTypes();
  await loadTimeline();
  await loadNotices();
  renderTeamsPanel();
}

function showNoTeamsState() {
  document.getElementById('teamNameHeader').textContent = 'Sin equipos';
  document.getElementById('teamDescSnippet').textContent = '';
  document.getElementById('eventGrid').innerHTML = `
    <div style="grid-column:1/-1;padding:24px;text-align:center;color:var(--muted);font-size:14px">
      Sin equipos todavía.<br>Crea uno o únete con un código de invitación usando ⚙️
    </div>`;
  renderTeamsPanel();
}

function updateHeader() {
  if (!activeTeam) return;
  document.getElementById('teamNameHeader').textContent = activeTeam.name;
  document.getElementById('teamDescSnippet').textContent = activeTeam.description || '';
}

// ── Event types ──
async function loadEventTypes() {
  const r = await apiFetch(`/teams/${activeTeam.id}/event-types`);
  if (!r.ok) return;
  eventTypesCache = await r.json();
  shiftEventType = eventTypesCache.find(et => et.is_header && et.is_active !== 0) || null;
  renderEventGrid();
  document.getElementById('shiftBanner').style.display = shiftEventType ? '' : 'none';
}

function renderEventGrid() {
  const grid = document.getElementById('eventGrid');
  const logTypes = eventTypesCache.filter(et => !et.is_header && et.is_active !== 0);
  if (!logTypes.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;padding:24px;text-align:center;color:var(--muted);font-size:13px">Sin tipos de evento. El administrador debe crearlos.</div>`;
    return;
  }
  grid.innerHTML = logTypes.map(et => `
    <button class="event-btn" onclick="openEventModal('${et.id}')">
      <span class="icon">${et.icon || '📝'}</span>
      ${escHtml(et.name)}
    </button>
  `).join('');
}

// ── Dynamic event modal ──
function openEventModal(etId) {
  currentModal = etId;
  const et = eventTypesCache.find(x => x.id === etId);
  if (!et) return;

  const now = new Date();
  const isoLocal = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);

  let fieldsHtml = '';
  if (et.field_type === 'boolean') {
    fieldsHtml = `
      <div class="field-group">
        <div class="toggle-row">
          <div class="toggle on" id="etToggle" onclick="this.classList.toggle('on')"></div>
          <span>${escHtml(et.name)}</span>
        </div>
      </div>`;
  } else if (et.field_type === 'dropdown') {
    const opts = safeParseJSON(et.options, []);
    fieldsHtml = `
      <div class="field-group">
        <label>${escHtml(et.name)}</label>
        <div class="radio-group">
          ${opts.map((o, i) => `
            <label class="radio-pill">
              <input type="radio" name="etOption" value="${escHtml(o)}" ${i === 0 ? 'checked' : ''}>
              <span>${escHtml(o)}</span>
            </label>`).join('')}
        </div>
      </div>`;
  } else if (et.field_type === 'multi_select') {
    const opts = safeParseJSON(et.options, []);
    fieldsHtml = `
      <div class="field-group">
        <label>${escHtml(et.name)}</label>
        <div class="checkbox-group">
          ${opts.map(o => `
            <label class="check-item">
              <input type="checkbox" value="${escHtml(o)}"> ${escHtml(o)}
            </label>`).join('')}
        </div>
      </div>`;
  } else if (et.field_type === 'numeric') {
    fieldsHtml = `
      <div class="field-group">
        <label>${escHtml(et.name)}</label>
        <input type="number" id="etNumeric" value="0">
      </div>`;
  } else if (et.field_type === 'text') {
    fieldsHtml = `
      <div class="field-group">
        <label>${escHtml(et.name)}</label>
        <textarea id="etText" rows="3" placeholder="Escribe aquí..."></textarea>
      </div>`;
  }

  document.getElementById('modalContent').innerHTML = `
    <h3>${escHtml(et.icon || '📝')} ${escHtml(et.name)}
      <button class="modal-close" onclick="closeModal()">✕</button>
    </h3>
    <div class="field-group">
      <label>Hora del evento</label>
      <input type="datetime-local" id="eventTime" value="${isoLocal}">
    </div>
    ${fieldsHtml}
    ${et.field_type !== 'text' ? `
    <div class="field-group">
      <label>Comentario (opcional)</label>
      <textarea id="eventComment" placeholder="Agregar nota..."></textarea>
    </div>` : ''}
    <button class="btn-save" onclick="saveEvent('${etId}')">Guardar</button>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function getEventValue(et) {
  if (et.field_type === 'boolean') {
    return document.getElementById('etToggle')?.classList.contains('on') ? 'true' : 'false';
  } else if (et.field_type === 'dropdown') {
    return document.querySelector('input[name="etOption"]:checked')?.value || '';
  } else if (et.field_type === 'multi_select') {
    return [...document.querySelectorAll('.checkbox-group input:checked')].map(c => c.value).join(', ');
  } else if (et.field_type === 'numeric') {
    return document.getElementById('etNumeric')?.value || '0';
  } else if (et.field_type === 'text') {
    return document.getElementById('etText')?.value || '';
  }
  return null;
}

async function saveEvent(etId) {
  const et = eventTypesCache.find(x => x.id === etId);
  if (!et) return;

  const rawTime = document.getElementById('eventTime')?.value || '';
  const timestamp = rawTime ? rawTime + ':00' : new Date().toISOString().slice(0, 19);
  const noteVal = document.getElementById('eventComment')?.value.trim() || null;
  const eventValue = getEventValue(et);

  const btn = document.querySelector('#modalContent .btn-save');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }

  try {
    const r = await apiFetch('/events', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        team_id: activeTeam.id,
        event_type_id: etId,
        event_value: eventValue || null,
        timestamp,
        note: noteVal
      })
    });
    if (!r.ok) throw new Error();
    closeModal();
    showToast(`✅ ${et.name} registrado`);
    await loadTimeline();
  } catch {
    showToast('❌ Error al guardar evento');
    if (btn) { btn.disabled = false; btn.textContent = 'Guardar'; }
  }
}

// ── Timeline ──
async function loadTimeline() {
  if (!activeTeam) return;
  const r = await apiFetch(`/events?team_id=${activeTeam.id}&limit=50`);
  if (!r.ok) return;
  const events = await r.json();
  renderTimeline(events);

  if (shiftEventType && currentUser) {
    try {
      const sr = await apiFetch(`/events?team_id=${activeTeam.id}&caregiver_id=${currentUser.id}&limit=10`);
      if (sr.ok) {
        const myEvents = await sr.json();
        const myShiftEvents = myEvents.filter(e => e.event_type_id === shiftEventType.id);
        if (myShiftEvents.length > 0) {
          const last = myShiftEvents[0];
          shiftActive = last.event_value !== 'termina';
          updateShiftUI(shiftActive ? last.timestamp : null);
        } else {
          shiftActive = false;
          updateShiftUI(null);
        }
      }
    } catch { /* keep current state */ }
  }
}

function renderTimeline(events) {
  const list = document.getElementById('timelineList');
  if (!events.length) {
    list.innerHTML = '<p style="text-align:center;color:var(--muted);padding:24px;font-size:13px;">Sin eventos registrados aún.</p>';
    return;
  }
  list.innerHTML = events.map(e => {
    const timeStr = (e.timestamp || '').slice(11, 16);
    return `
      <div class="timeline-item">
        <div class="tl-icon" style="background:${e.color || '#f1f5f9'}">${e.icon || '📝'}</div>
        <div class="tl-body">
          <div class="tl-head">
            <span class="tl-type">${escHtml(e.event_type_name)}</span>
            <span class="tl-time">${escHtml(timeStr)}</span>
          </div>
          ${e.event_value ? `<div class="tl-detail">${escHtml(e.event_value)}</div>` : ''}
          <div class="tl-user">${escHtml(e.caregiver_name)}</div>
          ${e.note ? `<div class="tl-note">"${escHtml(e.note)}"</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

// ── Shift ──
function updateShiftUI(startTimestamp) {
  if (!shiftEventType) return;
  const banner = document.getElementById('shiftBanner');
  const btn = document.getElementById('shiftBtn');
  const label = document.getElementById('shiftLabel');
  banner.style.display = '';
  if (shiftActive && startTimestamp) {
    const t = startTimestamp.slice(11, 16);
    banner.classList.remove('off');
    btn.className = 'shift-btn end';
    btn.textContent = 'Terminar turno';
    label.innerHTML = `🟢 Turno activo desde <b>${t}</b>`;
  } else {
    banner.classList.add('off');
    btn.className = 'shift-btn start';
    btn.textContent = 'Iniciar turno';
    label.innerHTML = '⏸️ Sin turno activo';
  }
}

function toggleShift() {
  if (!shiftEventType) { showToast('Sin tipo de turno configurado'); return; }
  if (shiftActive) { openEndShiftModal(); } else { startShift(); }
}

async function startShift() {
  const now = new Date();
  const ts = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 19);
  try {
    const r = await apiFetch('/events', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ team_id: activeTeam.id, event_type_id: shiftEventType.id, event_value: 'comienza', timestamp: ts, note: null })
    });
    if (!r.ok) throw new Error();
    shiftActive = true;
    updateShiftUI(ts);
    showToast('🟢 Turno iniciado');
    await loadTimeline();
  } catch {
    showToast('❌ Error al iniciar turno');
  }
}

function openEndShiftModal() {
  currentModal = '__endshift__';
  document.getElementById('modalContent').innerHTML = `
    <h3>🔴 Terminar turno <button class="modal-close" onclick="closeModal()">✕</button></h3>
    <div class="confirm-section">
      <h4>¿Estás segura que deseas terminar tu turno?</h4>
      <p>Se registrará como evento en la línea de tiempo.</p>
    </div>
    <button class="btn-save btn-danger" onclick="confirmEndShift()">Confirmar fin de turno</button>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

async function confirmEndShift() {
  const now = new Date();
  const ts = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 19);
  try {
    const r = await apiFetch('/events', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ team_id: activeTeam.id, event_type_id: shiftEventType.id, event_value: 'termina', timestamp: ts, note: null })
    });
    if (!r.ok) throw new Error();
    shiftActive = false;
    updateShiftUI(null);
    closeModal();
    showToast('🔴 Turno terminado');
    await loadTimeline();
  } catch {
    showToast('❌ Error al terminar turno');
  }
}

// ── Team status panel ──
let statusPanelOpen = false;

function toggleStatusPanel() {
  statusPanelOpen = !statusPanelOpen;
  document.getElementById('statusPanel').classList.toggle('open', statusPanelOpen);
  document.getElementById('bannerChevron').textContent = statusPanelOpen ? '▲' : '▼';
  if (statusPanelOpen) loadStatusPanel();
}

async function loadStatusPanel() {
  if (!activeTeam) return;
  const listEl = document.getElementById('statusMemberList');
  listEl.textContent = 'Cargando...';
  try {
    const membersRes = await apiFetch(`/teams/${activeTeam.id}/members`);
    if (!membersRes.ok) throw new Error('members');
    const members = await membersRes.json();

    if (!members.length) { listEl.textContent = 'Sin miembros en el equipo.'; return; }

    const lastStatus = {};
    if (shiftEventType) {
      const eventsRes = await apiFetch(`/events?team_id=${activeTeam.id}&limit=200`);
      if (eventsRes.ok) {
        const events = await eventsRes.json();
        for (const e of events) {
          if (e.event_type_id !== shiftEventType.id) continue;
          if (!lastStatus[e.caregiver_id]) lastStatus[e.caregiver_id] = e;
        }
      }
    }

    const rows = members.map(m => {
      const last = lastStatus[m.id];
      const active = last && last.event_value !== 'termina';
      const timeStr = last ? (last.timestamp || '').slice(11, 16) : null;
      return { name: m.name, active, timeStr, hasData: !!last };
    });
    rows.sort((a, b) => b.active - a.active || b.hasData - a.hasData);

    listEl.innerHTML = rows.map(r => `
      <div class="status-member-row">
        <div class="status-dot ${r.active ? 'active' : 'inactive'}"></div>
        <span class="status-member-name">${escHtml(r.name)}</span>
        <span class="status-member-time">${r.active ? '🟢 desde ' + (r.timeStr || '?') : r.timeStr ? '🔴 hasta ' + r.timeStr : 'Sin actividad'}</span>
      </div>
    `).join('');
  } catch {
    listEl.textContent = 'Error cargando estado del equipo.';
  }
}

// ── Pinned note ──
async function loadNotices() {
  if (!activeTeam) return;
  const r = await apiFetch(`/teams/${activeTeam.id}/notices`);
  if (!r.ok) return;
  const data = await r.json();
  pinnedNoteText = data.team_notices || '';
  renderPinned();
}

function renderPinned() {
  const textEl = document.getElementById('pinnedText');
  const metaEl = document.getElementById('pinnedMeta');
  if (pinnedNoteText) {
    textEl.textContent = pinnedNoteText;
    textEl.style.color = '';
    textEl.style.fontStyle = '';
    metaEl.textContent = '';
  } else {
    textEl.textContent = 'Sin nota fijada. Toca "Editar" para agregar una.';
    textEl.style.color = 'var(--muted)';
    textEl.style.fontStyle = 'italic';
    metaEl.textContent = '';
  }
}

function openPinnedEditor() {
  currentModal = '__pinned__';
  document.getElementById('modalContent').innerHTML = `
    <h3>📌 Editar nota fijada <button class="modal-close" onclick="closeModal()">✕</button></h3>
    <p class="modal-hint">Nota visible para todo el equipo.</p>
    <div class="field-group">
      <textarea id="pinnedInput" rows="5" style="min-height:120px">${escHtml(pinnedNoteText)}</textarea>
    </div>
    <button class="btn-save" onclick="savePinnedNote()">Guardar nota</button>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

async function savePinnedNote() {
  const newText = document.getElementById('pinnedInput')?.value.trim() || '';
  const btn = document.querySelector('#modalContent .btn-save');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }
  try {
    const r = await apiFetch(`/teams/${activeTeam.id}/notices`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ team_notices: newText })
    });
    if (!r.ok) throw new Error();
    pinnedNoteText = newText;
    renderPinned();
    closeModal();
    showToast('📌 Nota fijada actualizada');
  } catch {
    showToast('❌ Error al guardar nota');
    if (btn) { btn.disabled = false; btn.textContent = 'Guardar nota'; }
  }
}

// ── Teams panel ──
function renderTeamsPanel() {
  const container = document.getElementById('teamsCardList');
  if (!teamsCache.length) {
    container.innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">Sin equipos. Crea uno o únete con un código de invitación.</div>`;
    return;
  }
  const activeId = activeTeam?.id;
  const active = teamsCache.find(t => t.id === activeId);
  const others = teamsCache.filter(t => t.id !== activeId);
  let html = '';
  if (active) html += `<div class="tp-section-title">Equipo activo</div>${buildTeamCard(active, true)}`;
  if (others.length) html += `<div class="tp-section-title">Otros equipos</div>${others.map(t => buildTeamCard(t, false)).join('')}`;
  container.innerHTML = html;
  // After rendering, fetch and set notification toggle state for each team
  setTimeout(() => {
    teamsCache.forEach(async t => {
      try {
        const r = await apiFetch(`/teams/${t.id}/members/me/notifications`);
        if (r.ok) {
          const data = await r.json();
          const el = document.getElementById(`notif-toggle-${t.id}`);
          if (el) el.checked = !!data.receive_push_notifications;
        }
      } catch {}
    });
  }, 0);
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

async function getPushSubscription() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return null;
  const reg = await navigator.serviceWorker.ready;
  return reg.pushManager.getSubscription();
}

async function onNotifToggleChange(teamId, checked) {
  const revert = () => {
    const el = document.getElementById(`notif-toggle-${teamId}`);
    if (el) el.checked = !checked;
  };

  try {
    if (checked) {
      // 1. Request notification permission
      const perm = await Notification.requestPermission();
      if (perm !== 'granted') {
        showToast('⚠️ Permiso de notificaciones denegado');
        revert();
        return;
      }

      // 2. Get VAPID public key and subscribe
      let subscription = await getPushSubscription();
      if (!subscription) {
        const keyRes = await apiFetch('/notifications/vapid-public-key');
        if (!keyRes.ok) throw new Error('No VAPID key');
        const { public_key } = await keyRes.json();
        const reg = await navigator.serviceWorker.ready;
        subscription = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(public_key)
        });
        // Save subscription to backend
        const sub = subscription.toJSON();
        await apiFetch('/notifications/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ endpoint: sub.endpoint, keys: { p256dh: sub.keys.p256dh, auth: sub.keys.auth } })
        });
      }
    } else {
      // Unsubscribe from push
      const subscription = await getPushSubscription();
      if (subscription) {
        const sub = subscription.toJSON();
        await apiFetch('/notifications/unsubscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ endpoint: sub.endpoint })
        });
        await subscription.unsubscribe();
      }
    }

    // 3. Save preference to backend
    const r = await apiFetch(`/teams/${teamId}/members/me/notifications`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ receive_push_notifications: checked })
    });
    if (!r.ok) throw new Error();
    showToast(checked ? '🔔 Notificaciones activadas' : '🔕 Notificaciones desactivadas');
  } catch (e) {
    console.error('Push toggle error:', e);
    showToast('Error al actualizar notificaciones');
    revert();
  }
}

function buildTeamCard(team, isActive) {
  const roleStyles = {
    admin: 'background:#ede9fe;color:#7c3aed',
    contributor: 'background:#dbeafe;color:#2563eb',
    viewer: 'background:#f1f5f9;color:#64748b'
  };
  const roleLabels = { admin: 'Editor', contributor: 'Contribuidor', viewer: 'Visor' };
  const roleLabel = roleLabels[team.my_role] || team.my_role;
  const roleStyle = roleStyles[team.my_role] || '';
  const canAdmin = team.my_role === 'admin';
  return `
    <div class="tp-team-card ${isActive ? 'active' : ''}">
      <div class="tp-team-top">
        <div class="tp-team-icon">👥</div>
        <div class="tp-team-name">${escHtml(team.name)}</div>
      </div>
      <div class="tp-team-meta">
        <span class="tp-role-badge" style="${roleStyle}">${roleLabel}</span>
      </div>
      ${team.description ? `<div class="tp-team-desc">${escHtml(team.description)}</div>` : ''}
      <div class="tp-team-actions">
        <div class="tp-notif-toggle-row">
          <label style="font-size:13px;display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="checkbox" class="notif-toggle" id="notif-toggle-${team.id}" onchange="onNotifToggleChange('${team.id}', this.checked)" style="accent-color:#2563eb;" />
            <span>Recibir notificaciones push</span>
          </label>
        </div>
        ${isActive
          ? `<button class="tp-btn tp-btn-go" onclick="closeTeamsPanel();showToast('Ya estás en este equipo')">Ir al equipo</button>`
          : `<button class="tp-btn tp-btn-go" onclick="switchTeam('${team.id}')">Ir al equipo</button>`}
        ${canAdmin
          ? `<button class="tp-btn tp-btn-edit" onclick="window.location.href='admin.html?team_id=${team.id}'">Editar</button>`
          : `<button class="tp-btn tp-btn-edit tp-btn-locked" onclick="showToast('Solo los administradores pueden hacer cambios. Pide a un administrador que cambie tu nivel de acceso', 4000)">Editar</button>`}
      </div>
    </div>`;
}

async function switchTeam(teamId) {
  localStorage.setItem('activeTeamId', teamId);
  closeTeamsPanel();
  window.location.reload();
}

// ── Create / Join team modals ──
function openCreateTeamModal() {
  currentModal = '__createteam__';
  closeTeamsPanel();
  document.getElementById('modalContent').innerHTML = `
    <h3>➕ Crear equipo <button class="modal-close" onclick="closeModal()">✕</button></h3>
    <div class="field-group">
      <label>Nombre del equipo</label>
      <input type="text" id="newTeamName" placeholder="Ej: Cuidado de Sandra">
    </div>
    <div class="field-group">
      <label>Descripción / contexto del paciente (opcional)</label>
      <textarea id="newTeamDesc" rows="3" placeholder="Ej: Paciente femenina, 72 años, diabetes..."></textarea>
    </div>
    <button class="btn-save" onclick="doCreateTeam()">Crear equipo</button>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

async function doCreateTeam() {
  const name = document.getElementById('newTeamName').value.trim();
  const desc = document.getElementById('newTeamDesc').value.trim();
  if (!name) { showToast('⚠️ Ingresa el nombre del equipo'); return; }
  const btn = document.querySelector('#modalContent .btn-save');
  if (btn) { btn.disabled = true; btn.textContent = 'Creando...'; }
  try {
    const r = await apiFetch('/teams', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, description: desc || null })
    });
    if (!r.ok) throw new Error();
    const team = await r.json();
    localStorage.setItem('activeTeamId', team.id);
    closeModal();
    showToast('✅ Equipo creado');
    window.location.reload();
  } catch {
    showToast('❌ Error al crear equipo');
    if (btn) { btn.disabled = false; btn.textContent = 'Crear equipo'; }
  }
}

// ── Description modal ──
function openDescriptionModal() {
  currentModal = '__desc__';
  const desc = activeTeam?.description || 'Sin descripción.';
  document.getElementById('modalContent').innerHTML = `
    <h3>ℹ️ Sobre el equipo <button class="modal-close" onclick="closeModal()">✕</button></h3>
    <div class="desc-modal-body">${escHtml(desc)}</div>
  `;

// ── Modal helpers ──
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  currentModal = null;
}

// ── Teams panel helpers ──
function openTeamsPanel() {
  renderTeamsPanel();
  document.getElementById('teamsPanel').classList.add('open');
}
function closeTeamsPanel() {
  document.getElementById('teamsPanel').classList.remove('open');
}

// ── Contact modal ──
function openContactModal() {
  // Pre-fill phone/email from current user if available
  const u = currentUser;
  if (u) {
    const phone = u.phone && u.phone.startsWith('google_') ? '' : (u.phone || '');
    document.getElementById('cntPhone').value = phone;
    document.getElementById('cntEmail').value = u.email || '';
  }
  document.getElementById('cntMessage').value = '';
  document.getElementById('contactModal').style.display = 'flex';
}
function closeContactModal() {
  document.getElementById('contactModal').style.display = 'none';
}
async function sendContact() {
  const phone   = document.getElementById('cntPhone').value.trim();
  const email   = document.getElementById('cntEmail').value.trim();
  const message = document.getElementById('cntMessage').value.trim();
  if (!message) { showToast('Escribe un comentario', true); return; }
  const btn = document.getElementById('cntSendBtn');
  btn.disabled = true; btn.textContent = 'Enviando...';
  try {
    const r = await apiFetch('/support/contact', {
      method: 'POST',
      body: JSON.stringify({ phone, email, message })
    });
    if (r && r.ok !== false) {
      closeContactModal();
      showToast('\u2705 Mensaje enviado. ¡Gracias!');
    } else {
      showToast('Error al enviar. Intenta de nuevo.', true);
    }
  } catch {
    showToast('Error de conexión', true);
  } finally {
    btn.disabled = false; btn.textContent = 'Enviar mensaje';
  }
}

// ── Logout ──
async function doLogout() {
  await apiFetch('/auth/logout', { method: 'POST' }).catch(() => {});

  window.location.replace('login.html');
}

// ── Tabs ──
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.tab).classList.add('active');
  });
});

// ── Toast ──
function showToast(msg, duration) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration || 2000);
}

// ── JSON helper ──
function safeParseJSON(s, fallback) {
  try { return JSON.parse(s); } catch { return fallback; }
}

// ── Notification popup dismiss ──
function dismissNotif() {
  document.getElementById('notifPopup').style.display = 'none';
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
