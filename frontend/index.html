<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nurser</title>
  <style>
    body { margin: 0; background: #0f1117; display: flex; align-items: center; justify-content: center; height: 100vh; }
    p { color: #8b8fa8; font-family: sans-serif; font-size: 14px; }
  </style>
</head>
<body>
  <p>Cargando…</p>
  <script>
    (async () => {
      try {
        const r = await fetch('/users/me', { credentials: 'include' });
        window.location.replace(r.ok ? 'contributor.html' : 'login.html');
      } catch {
        window.location.replace('login.html');
      }
    })();
  </script>
</body>
</html>
