<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Nurser Admin</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f0f4f8; color: #1a202c; }

header {
  background: #1a202c; color: #fff;
  padding: 0 24px; height: 52px;
  display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 100;
}
header h1 { font-size: 15px; font-weight: 700; white-space: nowrap; }
.nav-tabs { display: flex; gap: 2px; }
.nav-tab { padding: 6px 14px; border-radius: 6px; background: transparent; color: #a0aec0; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
.nav-tab.active, .nav-tab:hover { background: #2d3748; color: #fff; }
.header-right { margin-left: auto; font-size: 12px; color: #718096; }

.breadcrumb { padding: 10px 24px; font-size: 13px; color: #718096; min-height: 36px; }
.breadcrumb a { color: #4361ee; cursor: pointer; }
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb span { color: #1a202c; font-weight: 600; }

.content { padding: 0 24px 48px; max-width: 1100px; margin: 0 auto; }

.card { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.07); margin-bottom: 16px; overflow: hidden; }
.card-header { padding: 14px 18px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #e2e8f0; }
.card-header h2 { font-size: 15px; font-weight: 700; flex: 1; }
.card-header .count { font-size: 12px; color: #718096; }

table { width: 100%; border-collapse: collapse; }
th { padding: 9px 18px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: #718096; background: #f8fafc; text-align: left; border-bottom: 1px solid #e2e8f0; }
td { padding: 10px 18px; font-size: 13px; border-bottom: 1px solid #f0f4f8; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafbfc; }
td.muted { color: #718096; }

.btn { display: inline-flex; align-items: center; gap: 4px; padding: 5px 11px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; white-space: nowrap; }
.btn-primary { background: #4361ee; color: #fff; }
.btn-primary:hover { background: #3a50d9; }
.btn-danger { background: #ef4444; color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn-ghost { background: #e2e8f0; color: #4a5568; }
.btn-ghost:hover { background: #cbd5e0; }
.btn-sm { padding: 3px 8px; font-size: 11px; }
.btn-link { background: none; padding: 0; color: #4361ee; font-weight: 600; font-size: 13px; cursor: pointer; border: none; }
.btn-link:hover { text-decoration: underline; }

.actions { display: flex; gap: 6px; }

select.role-sel { border: 1px solid #e2e8f0; border-radius: 6px; padding: 3px 6px; font-size: 11px; font-family: inherit; background: #fff; cursor: pointer; }

.inner-tabs { display: flex; border-bottom: 1px solid #e2e8f0; }
.inner-tab { padding: 10px 18px; border: none; background: transparent; font-size: 13px; font-weight: 600; color: #718096; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.inner-tab.active { color: #4361ee; border-bottom-color: #4361ee; }

.tab-toolbar { padding: 12px 18px; border-bottom: 1px solid #e2e8f0; display: flex; gap: 8px; }

.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
.modal-bg.open { display: flex; }
.modal-box { background: #fff; border-radius: 12px; width: 100%; max-width: 460px; max-height: 85vh; overflow-y: auto; padding: 24px; }
.modal-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.form-group { margin-bottom: 13px; }
.form-group label { display: block; font-size: 11px; font-weight: 700; color: #718096; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
.form-group input, .form-group textarea, .form-group select { width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 12px; font-size: 14px; outline: none; font-family: inherit; }
.form-group input:focus, .form-group textarea:focus { border-color: #4361ee; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

.warn-box { background: #fffbeb; border: 1px solid #f59e0b; border-radius: 8px; padding: 12px 14px; margin-bottom: 14px; font-size: 13px; color: #92400e; line-height: 1.5; }
.warn-box ul { margin-top: 6px; padding-left: 16px; }

.empty-row td { text-align: center; color: #718096; padding: 28px; }

#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a202c; color: #fff; padding: 9px 18px; border-radius: 24px; font-size: 13px; opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 1000; white-space: nowrap; }
#toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>🏥 Nurser Admin</h1>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tabUsers" onclick="showSection('users')">👥 Users</button>
    <button class="nav-tab" id="tabTeams" onclick="showSection('teams')">🏠 Teams</button>
  </div>
  <div class="header-right" id="headerRight"></div>
</header>

<div class="breadcrumb" id="breadcrumb"></div>

<div class="content">

  <!-- USERS -->
  <div id="usersSection">
    <div class="card">
      <div class="card-header">
        <h2>👥 Users</h2>
        <span class="count" id="userCount"></span>
      </div>
      <table>
        <thead><tr>
          <th>Name</th><th>Phone</th><th>Email</th><th>Verified</th><th>Google</th><th>Created</th><th>Actions</th>
        </tr></thead>
        <tbody id="usersTbody"><tr><td colspan="7" class="empty-row">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- TEAMS -->
  <div id="teamsSection" style="display:none">

    <!-- Team list -->
    <div id="teamListView">
      <div class="card">
        <div class="card-header">
          <h2>🏠 Teams</h2>
          <span class="count" id="teamCount"></span>
        </div>
        <table>
          <thead><tr>
            <th>Name</th><th>Description</th><th>Members</th><th>Created</th><th>Actions</th>
          </tr></thead>
          <tbody id="teamsTbody"><tr><td colspan="5" class="empty-row">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- Team detail (drill-down) -->
    <div id="teamDetailView" style="display:none">
      <div class="card">
        <div class="card-header">
          <h2 id="teamDetailName"></h2>
          <button class="btn btn-ghost btn-sm" onclick="openEditTeamFromDetail()">Edit</button>
        </div>
        <div class="inner-tabs">
          <button class="inner-tab active" id="itMembers"       onclick="showInnerTab('members')">👥 Members</button>
          <button class="inner-tab"        id="itActivityTypes" onclick="showInnerTab('activityTypes')">📋 Activity Types</button>
          <button class="inner-tab"        id="itEvents"        onclick="showInnerTab('events')">📝 Events</button>
        </div>
        <div id="innerContent"></div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modalBox"></div>
</div>

<div id="toast"></div>

<script>
// ── State ────────────────────────────────────────────────────
let users = [], teams = [];
let activeTeam = null, teamMembers = [], activityTypes = [], teamEvents = [];
let eventsOffset = 0;

// ── Bootstrap ────────────────────────────────────────────────
async function init() {
  const r = await api('/admin/api/users');
  if (r.status === 401 || r.status === 403) { location.replace('/login.html'); return; }
  users = await r.json();
  renderUsers();
}

// ── Sections ─────────────────────────────────────────────────
function showSection(s) {
  document.getElementById('usersSection').style.display = s === 'users' ? '' : 'none';
  document.getElementById('teamsSection').style.display = s === 'teams' ? '' : 'none';
  document.getElementById('tabUsers').classList.toggle('active', s === 'users');
  document.getElementById('tabTeams').classList.toggle('active', s === 'teams');
  setBreadcrumb([]);
  if (s === 'teams') loadTeams();
}

function setBreadcrumb(parts) {
  const el = document.getElementById('breadcrumb');
  if (!parts.length) { el.innerHTML = ''; return; }
  el.innerHTML = parts.map((p, i) =>
    i < parts.length - 1
      ? `<a onclick="${p.fn}">${p.label}</a> ›`
      : `<span>${p.label}</span>`
  ).join(' ');
}

// ── Users ────────────────────────────────────────────────────
function renderUsers() {
  document.getElementById('userCount').textContent = `${users.length} users`;
  document.getElementById('usersTbody').innerHTML = users.length ? users.map(u => `
    <tr>
      <td><b>${esc(u.name)}</b></td>
      <td class="muted">${esc(u.phone && u.phone.startsWith('google_') ? '— (Google only)' : u.phone || '—')}</td>
      <td class="muted">${esc(u.email || '—')}</td>
      <td>${u.phone_verified ? '✅' : '❌'}</td>
      <td>${u.google_id ? '🔗' : '—'}</td>
      <td class="muted">${(u.created_at || '').substring(0, 10)}</td>
      <td class="actions">
        <button class="btn btn-ghost btn-sm" onclick="openEditUser('${u.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDeleteUser('${u.id}')">Delete</button>
      </td>
    </tr>`).join('') : `<tr><td colspan="7" class="empty-row">No users</td></tr>`;
}

function openEditUser(id) {
  const u = users.find(x => x.id === id); if (!u) return;
  const phone = u.phone && u.phone.startsWith('google_') ? '' : (u.phone || '');
  openModal(`
    <h3>Edit User</h3>
    <div class="form-group"><label>Name</label><input id="euName" value="${esc(u.name || '')}"></div>
    <div class="form-group"><label>Phone</label><input id="euPhone" value="${esc(phone)}" placeholder="+52 55 1234 5678"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveUser('${id}')">Save</button>
    </div>`);
}

async function saveUser(id) {
  const name = document.getElementById('euName').value.trim();
  const phone = document.getElementById('euPhone').value.trim();
  const body = {};
  if (name) body.name = name;
  if (phone) body.phone = phone;
  const r = await api(`/admin/api/users/${id}`, { method: 'PATCH', body: JSON.stringify(body) });
  if (r.ok) {
    const updated = await r.json();
    users = users.map(u => u.id === id ? { ...u, ...updated } : u);
    renderUsers(); closeModal(); toast('User updated');
  } else { const d = await r.json().catch(() => ({})); toast(d.detail || 'Error', true); }
}

async function confirmDeleteUser(id) {
  const u = users.find(x => x.id === id); if (!u) return;
  const r = await api(`/admin/api/users/${id}/delete-check`);
  const data = await r.json();
  const warnings = data.warnings || [];
  const warnHtml = warnings.length
    ? `<div class="warn-box">⚠️ This user is the <b>sole admin</b> of teams with other members.
        <b>Those teams and all their data will be deleted:</b>
        <ul>${warnings.map(w => `<li>${esc(w.team_name)} (${w.member_count} members)</li>`).join('')}</ul>
       </div>` : '';
  openModal(`
    <h3>Delete User</h3>
    ${warnHtml}
    <p style="font-size:14px;margin-bottom:16px">Delete <b>${esc(u.name)}</b>? All their registered activities will be removed. This cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="deleteUser('${id}', ${warnings.length > 0})">Delete</button>
    </div>`);
}

async function deleteUser(id, force) {
  const r = await api(`/admin/api/users/${id}?force=${force}`, { method: 'DELETE' });
  if (r.ok) {
    users = users.filter(u => u.id !== id);
    renderUsers(); closeModal(); toast('User deleted');
  } else {
    const d = await r.json().catch(() => ({}));
    toast((d.detail && d.detail.message) || d.detail || 'Error', true);
  }
}

// ── Teams ────────────────────────────────────────────────────
async function loadTeams() {
  const r = await api('/admin/api/teams');
  if (!r.ok) return;
  teams = await r.json();
  renderTeams();
}

function renderTeams() {
  document.getElementById('teamCount').textContent = `${teams.length} teams`;
  document.getElementById('teamsTbody').innerHTML = teams.length ? teams.map(t => `
    <tr>
      <td><button class="btn-link" onclick="openTeam('${t.id}')">${esc(t.name)}</button></td>
      <td class="muted" style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.description || '—')}</td>
      <td>${t.member_count}</td>
      <td class="muted">${(t.created_at || '').substring(0, 10)}</td>
      <td class="actions">
        <button class="btn btn-ghost btn-sm" onclick="openEditTeam('${t.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDeleteTeam('${t.id}')">Delete</button>
      </td>
    </tr>`).join('') : `<tr><td colspan="5" class="empty-row">No teams</td></tr>`;
}

function openEditTeam(id) {
  const t = teams.find(x => x.id === id); if (!t) return;
  openModal(`
    <h3>Edit Team</h3>
    <div class="form-group"><label>Name</label><input id="etName" value="${esc(t.name || '')}"></div>
    <div class="form-group"><label>Description</label><textarea id="etDesc" rows="2">${esc(t.description || '')}</textarea></div>
    <div class="form-group"><label>Pinned Notice</label><textarea id="etNotice" rows="3">${esc(t.team_notices || '')}</textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTeam('${id}')">Save</button>
    </div>`);
}

function openEditTeamFromDetail() {
  if (activeTeam) openEditTeam(activeTeam.id);
}

async function saveTeam(id) {
  const body = {
    name: document.getElementById('etName').value.trim(),
    description: document.getElementById('etDesc').value.trim(),
    team_notices: document.getElementById('etNotice').value.trim(),
  };
  const r = await api(`/admin/api/teams/${id}`, { method: 'PATCH', body: JSON.stringify(body) });
  if (r.ok) {
    const updated = await r.json();
    teams = teams.map(t => t.id === id ? { ...t, ...updated } : t);
    if (activeTeam && activeTeam.id === id) {
      activeTeam = { ...activeTeam, ...updated };
      document.getElementById('teamDetailName').textContent = activeTeam.name;
    }
    renderTeams(); closeModal(); toast('Team updated');
  } else { const d = await r.json().catch(() => ({})); toast(d.detail || 'Error', true); }
}

function confirmDeleteTeam(id) {
  const t = teams.find(x => x.id === id); if (!t) return;
  openModal(`
    <h3>Delete Team</h3>
    <p style="font-size:14px;margin-bottom:16px">Delete <b>${esc(t.name)}</b> and all its members, activity types and events? Cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="deleteTeam('${id}')">Delete</button>
    </div>`);
}

async function deleteTeam(id) {
  const r = await api(`/admin/api/teams/${id}`, { method: 'DELETE' });
  if (r.ok) {
    teams = teams.filter(t => t.id !== id);
    if (activeTeam && activeTeam.id === id) closeTeam();
    renderTeams(); closeModal(); toast('Team deleted');
  } else { const d = await r.json().catch(() => ({})); toast(d.detail || 'Error', true); }
}

// ── Team Detail ───────────────────────────────────────────────
function openTeam(id) {
  activeTeam = teams.find(t => t.id === id); if (!activeTeam) return;
  document.getElementById('teamListView').style.display = 'none';
  document.getElementById('teamDetailView').style.display = '';
  document.getElementById('teamDetailName').textContent = activeTeam.name;
  setBreadcrumb([{ label: 'Teams', fn: 'closeTeam()' }, { label: activeTeam.name }]);
  showInnerTab('members');
}

function closeTeam() {
  document.getElementById('teamListView').style.display = '';
  document.getElementById('teamDetailView').style.display = 'none';
  activeTeam = null;
  setBreadcrumb([]);
}

function showInnerTab(tab) {
  ['members', 'activityTypes', 'events'].forEach(t => {
    const ids = { members: 'itMembers', activityTypes: 'itActivityTypes', events: 'itEvents' };
    document.getElementById(ids[t]).classList.toggle('active', t === tab);
  });
  if (tab === 'members') loadMembers();
  else if (tab === 'activityTypes') loadActivityTypes();
  else { eventsOffset = 0; loadEvents(0); }
}

// ── Members ───────────────────────────────────────────────────
async function loadMembers() {
  const r = await api(`/admin/api/teams/${activeTeam.id}/members`);
  if (!r.ok) return;
  teamMembers = await r.json();
  const memberIds = new Set(teamMembers.map(m => m.id));
  document.getElementById('innerContent').innerHTML = `
    <div class="tab-toolbar">
      <button class="btn btn-primary btn-sm" onclick="openAddMember()">+ Add Member</button>
    </div>
    <table>
      <thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Role</th><th>Joined</th><th>Actions</th></tr></thead>
      <tbody>${teamMembers.length ? teamMembers.map(m => `
        <tr>
          <td><b>${esc(m.name)}</b></td>
          <td class="muted">${esc(m.phone && m.phone.startsWith('google_') ? '— (Google only)' : m.phone || '—')}</td>
          <td class="muted">${esc(m.email || '—')}</td>
          <td>
            <select class="role-sel" onchange="updateRole('${m.id}', this.value)">
              ${['admin','contributor','viewer'].map(role =>
                `<option value="${role}" ${m.role === role ? 'selected' : ''}>${role}</option>`
              ).join('')}
            </select>
          </td>
          <td class="muted">${(m.joined_at || '').substring(0, 10)}</td>
          <td><button class="btn btn-danger btn-sm" onclick="removeMember('${m.id}')">Remove</button></td>
        </tr>`).join('') : `<tr><td colspan="6" class="empty-row">No members</td></tr>`}
      </tbody>
    </table>`;
}

function openAddMember() {
  const memberIds = new Set(teamMembers.map(m => m.id));
  const available = users.filter(u => !memberIds.has(u.id));
  if (!available.length) { toast('All users are already members of this team'); return; }
  openModal(`
    <h3>Add Member</h3>
    <div class="form-group">
      <label>User</label>
      <select id="amUserId">
        ${available.map(u => `<option value="${u.id}">${esc(u.name)} — ${esc(u.phone && u.phone.startsWith('google_') ? (u.email || 'Google only') : u.phone || '')}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="amRole">
        <option value="contributor">Contributor</option>
        <option value="admin">Admin</option>
        <option value="viewer">Viewer</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addMember()">Add</button>
    </div>`);
}

async function addMember() {
  const user_id = document.getElementById('amUserId').value;
  const role = document.getElementById('amRole').value;
  const r = await api(`/admin/api/teams/${activeTeam.id}/members`, {
    method: 'POST', body: JSON.stringify({ user_id, role })
  });
  if (r.ok) { closeModal(); loadMembers(); toast('Member added'); }
  else { const d = await r.json().catch(() => ({})); toast(d.detail || 'Error', true); }
}

async function updateRole(uid, role) {
  const r = await api(`/admin/api/teams/${activeTeam.id}/members/${uid}`, {
    method: 'PATCH', body: JSON.stringify({ role })
  });
  if (r.ok) toast('Role updated');
  else { toast('Failed to update role', true); loadMembers(); }
}

async function removeMember(uid) {
  if (!confirm('Remove this member from the team?')) return;
  const r = await api(`/admin/api/teams/${activeTeam.id}/members/${uid}`, { method: 'DELETE' });
  if (r.ok) { toast('Member removed'); loadMembers(); }
  else toast('Error removing member', true);
}

// ── Activity Types ────────────────────────────────────────────
async function loadActivityTypes() {
  const r = await api(`/admin/api/teams/${activeTeam.id}/event-types`);
  if (!r.ok) return;
  activityTypes = await r.json();
  const LABELS = { text: 'Text', boolean: 'Yes/No', numeric: 'Number', dropdown: 'Dropdown', multi_select: 'Multi-select', timestamp_event: 'Shift (system)' };
  document.getElementById('innerContent').innerHTML = `
    <table>
      <thead><tr><th>Icon</th><th>Name</th><th>Type</th><th>Active</th><th>System</th><th>Actions</th></tr></thead>
      <tbody>${activityTypes.length ? activityTypes.map(et => `
        <tr>
          <td style="font-size:18px">${et.icon || '📌'}</td>
          <td><b>${esc(et.name)}</b></td>
          <td class="muted">${LABELS[et.field_type] || et.field_type}</td>
          <td>${et.is_active ? '✅' : '❌'}</td>
          <td>${et.is_header ? '🔑 System' : ''}</td>
          <td class="actions">
            <button class="btn btn-ghost btn-sm" onclick="openEditAT('${et.id}')">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteAT('${et.id}')">Delete</button>
          </td>
        </tr>`).join('') : `<tr><td colspan="6" class="empty-row">No activity types</td></tr>`}
      </tbody>
    </table>`;
}

function openEditAT(id) {
  const et = activityTypes.find(x => x.id === id); if (!et) return;
  openModal(`
    <h3>Edit Activity Type</h3>
    <div class="form-group"><label>Name</label><input id="atName" value="${esc(et.name || '')}"></div>
    <div class="form-group"><label>Icon</label><input id="atIcon" value="${esc(et.icon || '')}" placeholder="📝"></div>
    <div class="form-group">
      <label>Status</label>
      <select id="atActive">
        <option value="1" ${et.is_active ? 'selected' : ''}>Active</option>
        <option value="0" ${!et.is_active ? 'selected' : ''}>Inactive</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveAT('${id}')">Save</button>
    </div>`);
}

async function saveAT(id) {
  const body = {
    name: document.getElementById('atName').value.trim(),
    icon: document.getElementById('atIcon').value.trim(),
    is_active: parseInt(document.getElementById('atActive').value),
  };
  const r = await api(`/admin/api/teams/${activeTeam.id}/event-types/${id}`, {
    method: 'PATCH', body: JSON.stringify(body)
  });
  if (r.ok) { closeModal(); loadActivityTypes(); toast('Activity type saved'); }
  else { const d = await r.json().catch(() => ({})); toast(d.detail || 'Error', true); }
}

async function deleteAT(id) {
  if (!confirm('Delete this activity type? Events logged under it will lose their type reference.')) return;
  const r = await api(`/admin/api/teams/${activeTeam.id}/event-types/${id}`, { method: 'DELETE' });
  if (r.ok) { loadActivityTypes(); toast('Activity type deleted'); }
  else toast('Error', true);
}

// ── Events ────────────────────────────────────────────────────
async function loadEvents(offset) {
  eventsOffset = offset;
  const r = await api(`/admin/api/teams/${activeTeam.id}/events?limit=50&offset=${offset}`);
  if (!r.ok) return;
  teamEvents = await r.json();
  document.getElementById('innerContent').innerHTML = `
    <table>
      <thead><tr><th>Timestamp</th><th>Caregiver</th><th>Activity Type</th><th>Value</th><th>Actions</th></tr></thead>
      <tbody>${teamEvents.length ? teamEvents.map(e => `
        <tr>
          <td class="muted">${(e.timestamp || '').replace('T', ' ').substring(0, 16)}</td>
          <td>${esc(e.caregiver_name)}</td>
          <td>${esc(e.event_type_icon || '')} ${esc(e.event_type_name)}</td>
          <td class="muted" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.event_value || '—')}</td>
          <td><button class="btn btn-danger btn-sm" onclick="deleteEvent('${e.id}')">Delete</button></td>
        </tr>`).join('') : `<tr><td colspan="5" class="empty-row">No events</td></tr>`}
      </tbody>
    </table>
    <div style="padding:12px 18px;display:flex;gap:8px;border-top:1px solid #e2e8f0">
      ${offset > 0 ? `<button class="btn btn-ghost btn-sm" onclick="loadEvents(${offset - 50})">← Previous</button>` : ''}
      ${teamEvents.length === 50 ? `<button class="btn btn-ghost btn-sm" onclick="loadEvents(${offset + 50})">Next →</button>` : ''}
      <span style="font-size:12px;color:#718096;align-self:center">Showing ${offset + 1}–${offset + teamEvents.length}</span>
    </div>`;
}

async function deleteEvent(id) {
  if (!confirm('Delete this event?')) return;
  const r = await api(`/admin/api/events/${id}`, { method: 'DELETE' });
  if (r.ok) { toast('Event deleted'); loadEvents(eventsOffset); }
  else toast('Error', true);
}

// ── Utilities ─────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function openModal(html) {
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function toast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isErr ? '#ef4444' : '#1a202c';
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2500);
}

async function api(url, opts = {}) {
  return fetch(url, {
    credentials: 'include',
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    ...opts,
  });
}

init();
</script>
</body>
</html>
